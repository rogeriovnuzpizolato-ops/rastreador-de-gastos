<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rastreador de Gastos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">

    <header>
      <h1>💸 Rastreador de Gastos</h1>
      <p>Controle seus gastos de forma simples</p>
    </header>

    <!-- TOTAL -->
    <div class="total-card">
      <div>
        <div class="label">Total gasto</div>
        <div class="amount" id="total-amount">R$ 0,00</div>
      </div>
      <div style="text-align:right">
        <div class="count" id="total-count">0 registros</div>
      </div>
    </div>

    <!-- FORM -->
    <div class="card">
      <h2>Novo gasto</h2>
      <div class="form-grid">
        <div class="full">
          <label for="desc">Descrição</label>
          <input type="text" id="desc" placeholder="Ex: Almoço no restaurante" />
        </div>
        <div>
          <label for="value">Valor (R$)</label>
          <input type="number" id="value" placeholder="0,00" min="0" step="0.01" />
        </div>
        <div>
          <label for="category">Categoria</label>
          <select id="category">
            <option value="alimentacao">🍔 Alimentação</option>
            <option value="transporte">🚌 Transporte</option>
            <option value="lazer">🎮 Lazer</option>
            <option value="saude">💊 Saúde</option>
            <option value="outros">📦 Outros</option>
          </select>
        </div>
      </div>
      <button class="btn-add" id="btn-add">+ Adicionar gasto</button>
    </div>

    <!-- FILTER + LIST -->
    <div class="card">
      <h2>Registros</h2>
      <div class="filter-row" id="filter-row">
        <button class="filter-btn active" data-filter="todos">Todos</button>
        <button class="filter-btn" data-filter="alimentacao">🍔 Alimentação</button>
        <button class="filter-btn" data-filter="transporte">🚌 Transporte</button>
        <button class="filter-btn" data-filter="lazer">🎮 Lazer</button>
        <button class="filter-btn" data-filter="saude">💊 Saúde</button>
        <button class="filter-btn" data-filter="outros">📦 Outros</button>
      </div>

      <div style="margin-top: 16px;">
        <div id="expense-list">
          <div class="empty-state">
            <span>🧾</span>
            Nenhum gasto registrado ainda.
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
